services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # The default (final) stage is "runner", a pruned standalone bundle
      # with no dev toolchain - fine for production, but `npm run dev`
      # below needs the full "builder" stage (complete node_modules).
      target: builder
    env_file:
      - .env
    ports:
      - "3000:3000"
    extra_hosts:
      # Lets the container reach a Spring Boot (or any) service running on the
      # host machine via http://host.docker.internal:<port>. Docker Desktop
      # (Windows/Mac) already resolves this automatically; this mapping makes
      # it work on Linux engines too.
      - "host.docker.internal:host-gateway"
    environment:
      # Dockerfile bakes NODE_ENV=production for the production stage; this
      # override is needed since compose runs `npm run dev` on that image,
      # and route logging (e.g. unmasked secrets) keys off NODE_ENV.
      NODE_ENV: development
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
